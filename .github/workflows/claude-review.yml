name: Claude Security Review

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  security:
    # Dependabot-triggered pull_request runs get NO repository secrets
    # (GitHub policy) — ANTHROPIC_API_KEY is empty and the action fails on
    # every version bump. Dependency bumps carry no reviewable app code, so
    # skip honestly instead of failing red.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - name: Claude Code Security Review
        uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          comment-pr: true
          exclude-directories: "node_modules,dist,.next,knowledge-base/venv,orgs"
